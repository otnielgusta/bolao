{% extends "base.html" %}
{% block title %}Criar Conta — Bolão Copa 2026{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 sm:mt-16">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">⚽</div>
    <h1 class="text-3xl font-extrabold tracking-tight text-pitch-900">Crie sua conta</h1>
    <p class="text-sm text-gray-500 mt-2">Monte seu bolão e desafie os amigos na Copa 2026</p>
  </div>

  <div class="bg-white rounded-2xl shadow-lift p-8">
    {% if error %}
    <div class="bg-red-50 border border-red-100 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2">
      <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/auth/register" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Nome de exibição</label>
        <input type="text" name="display_name" required placeholder="Como aparecerá no ranking" maxlength="100"
               class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-pitch-500 focus:border-pitch-500 focus:bg-white outline-none transition">
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Email</label>
        <input type="email" name="email" required placeholder="voce@email.com"
               class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-pitch-500 focus:border-pitch-500 focus:bg-white outline-none transition">
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Senha</label>
        <input type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres"
               class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-pitch-500 focus:border-pitch-500 focus:bg-white outline-none transition">
      </div>
      <button type="submit"
              class="w-full bg-pitch-700 hover:bg-pitch-800 active:scale-[0.99] text-white font-bold py-3 rounded-xl transition shadow-card">
        Criar conta
      </button>
    </form>
  </div>

  <p class="text-center text-sm text-gray-500 mt-6">
    Já tem conta?
    <a href="/auth/login" class="text-pitch-700 font-semibold hover:underline">Faça login</a>
  </p>
</div>
{% endblock %}
